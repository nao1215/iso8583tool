# generated by octocov init
coverage:
  if: true
  acceptable: 80%
  exclude:
    - "**/main.go"
  # Emit a self-contained SVG badge so the README can show the coverage % even
  # though this repo is not registered in octocovs-central-repo. The Coverage
  # workflow regenerates and commits this on push to main.
  badge:
    path: docs/coverage.svg
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
