name: reviewdog
on: [pull_request]

# reviewdog posts its findings as pull-request review comments, which needs
# write access to pull requests; reading the checked-out code needs contents.
permissions:
  contents: read
  pull-requests: write

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: reviewdog/action-golangci-lint@v2
        with:
          golangci_lint_flags: "--timeout 10m"
          reporter: github-pr-review
          level: warning

  misspell:
    name: misspell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: reviewdog/action-misspell@v1
        with:
          reporter: github-pr-review
          level: warning
          locale: "US"
          # "Authorised"/"Authorisation" are the official British-spelled EMV tag
          # names (e.g. tag 9F02 "Amount, Authorised (Numeric)") used verbatim in
          # the spec and asserted in tests, so they are not misspellings here.
          ignore: "authorised,authorisation"

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review
          level: warning
