# Migrated from iso8583tool's ShellSpec spec/sanitize_output_spec.sh.
# A field value carrying raw ANSI/control bytes must not be emitted verbatim by
# any text view: view, validate, diff, and redact escape it (caret notation,
# like `cat -v`) so it cannot drive the terminal. The poisoned message is built
# under a custom spec where field 41 is Binary, then read under basei-starter,
# where field 41 is plain text.
#
# The ShellSpec `esc()` helper printed a literal ESC byte (0x1b); the assertions
# check the raw ESC is NOT present (it is escaped to "^[" instead). Here the ESC
# byte is matched with a YAML "\x1b" escape, and "^[" is matched literally.
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool control-byte sanitization

scenarios:
  - name: view escapes control bytes
    steps:
      - fixture: &bin41
          file: bin41.json
          content: '{"name":"Bin41","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"41":{"type":"Binary","length":8,"description":"Terminal","enc":"Binary","prefix":"Binary.Fixed"}}}'
      - run:
          shell: true
          command: "printf '%s' '{\"mti\":\"0100\",\"binary_fields\":{\"41\":\"1B5B324A20202020\"}}' | iso8583tool convert --to hex --spec bin41.json > a.hex"
      - run:
          command: iso8583tool view a.hex --no-color
      - assert:
          exit_code: 0
          stdout:
            not_contains: "\x1b"
      - assert:
          stdout:
            contains: "^["

  - name: validate escapes control bytes
    steps:
      - fixture: *bin41
      - run:
          shell: true
          command: "printf '%s' '{\"mti\":\"0100\",\"binary_fields\":{\"41\":\"1B5B324A20202020\"}}' | iso8583tool convert --to hex --spec bin41.json > a.hex"
      - run:
          command: iso8583tool validate a.hex --no-color
      - assert:
          exit_code: 0
          stdout:
            not_contains: "\x1b"

  - name: diff escapes control bytes
    steps:
      - fixture: *bin41
      - run:
          shell: true
          command: "printf '%s' '{\"mti\":\"0100\",\"binary_fields\":{\"41\":\"1B5B324A20202020\"}}' | iso8583tool convert --to hex --spec bin41.json > a.hex"
      - run:
          shell: true
          command: "printf '%s' '{\"mti\":\"0100\",\"binary_fields\":{\"41\":\"1B5B316D20202020\"}}' | iso8583tool convert --to hex --spec bin41.json > b.hex"
      - run:
          command: iso8583tool diff a.hex b.hex --no-color
      - assert:
          exit_code: 0
          stdout:
            not_contains: "\x1b"
      - assert:
          stdout:
            contains: "^["

  - name: redact text escapes control bytes
    steps:
      - fixture: *bin41
      - run:
          shell: true
          command: "printf '%s' '{\"mti\":\"0100\",\"binary_fields\":{\"41\":\"1B5B324A20202020\"}}' | iso8583tool convert --to hex --spec bin41.json > a.hex"
      - run:
          command: iso8583tool redact a.hex --format text --no-color
      - assert:
          exit_code: 0
          stdout:
            not_contains: "\x1b"
      - assert:
          stdout:
            contains: "^["
