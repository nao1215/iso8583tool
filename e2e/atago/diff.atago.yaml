# Migrated from iso8583tool's ShellSpec spec/diff_spec.sh.
# diff: field-level comparison, JSON output, filtering, stdin, and the
# identical-message case. The ShellSpec setup_pair helper (which built the pair
# with a copy + convert | sed | convert pipeline) is replaced by shell-free
# workdir JSON fixtures that `convert --output` into before.hex / after.hex with
# field 4 / 55.9F02 differing, so every scenario runs on every OS. JSON output is
# asserted via atago's `stdout.json` JSONPath matcher instead of jq.
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool diff

scenarios:
  - name: reports changed fields in text form
    steps:
      - fixture:
          file: before.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: after.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert before.json --to hex --output before.hex"
      - run:
          command: "iso8583tool convert after.json --to hex --output after.hex"
      - run:
          command: "iso8583tool diff before.hex after.hex"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Field 4 changed"
              - "- 000000005000"
              - "+ 000000009999"

  - name: emits jq-compatible JSON
    steps:
      - fixture:
          file: before.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: after.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert before.json --to hex --output before.hex"
      - run:
          command: "iso8583tool convert after.json --to hex --output after.hex"
      - run:
          command: "iso8583tool diff before.hex after.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.changes[0].kind", equals: "changed" }

  - name: reports no differences for identical messages
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex"
      - assert:
          exit_code: 0
          stdout:
            contains: "No differences."

  - name: filters to a field subtree
    steps:
      - fixture:
          file: before.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"},"binary_fields":{"55.9F02":"000000005000"}}'
      - fixture:
          file: after.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"},"binary_fields":{"55.9F02":"000000009999"}}'
      - run:
          command: "iso8583tool convert before.json --to hex --output before.hex"
      - run:
          command: "iso8583tool convert after.json --to hex --output after.hex"
      - run:
          command: "iso8583tool diff before.hex after.hex --filter 55"
      - assert:
          exit_code: 0
          stdout:
            contains: "55.9F02"
      - assert:
          stdout:
            not_contains: "Field 4 "

  - name: reads one side from stdin
    steps:
      - fixture:
          file: before.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: after.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert before.json --to hex --output before.hex"
      - run:
          command: "iso8583tool convert after.json --to hex --output after.hex"
      - run:
          command: "iso8583tool diff before.hex -"
          stdin:
            file: after.hex
      - assert:
          exit_code: 0
          stdout:
            contains: "changed"

  - name: rejects two stdin sides
    steps:
      - run:
          command: "iso8583tool diff - -"
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "stdin"

  - name: masks track data by default
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex --color never"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111D"

  - name: reveals raw values with --unsafe
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex --color never --unsafe"
      - assert:
          exit_code: 0
          stdout:
            contains: "4111111111111111D"

  - name: rejects an unknown --format value
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex --format bogus"
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "unsupported format"

  - name: private-field safety - masks an embedded PAN by default
    steps:
      - fixture:
          file: pa.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111111111111111"}}'
      - fixture:
          file: pb.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4222222222222222"}}'
      - run:
          command: "iso8583tool convert pa.json --to hex --output pa.hex"
      - run:
          command: "iso8583tool convert pb.json --to hex --output pb.hex"
      - run:
          command: "iso8583tool diff pa.hex pb.hex --color never"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: private-field safety - reveals the embedded PAN with --unsafe
    steps:
      - fixture:
          file: pa.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111111111111111"}}'
      - fixture:
          file: pb.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4222222222222222"}}'
      - run:
          command: "iso8583tool convert pa.json --to hex --output pa.hex"
      - run:
          command: "iso8583tool convert pb.json --to hex --output pb.hex"
      - run:
          command: "iso8583tool diff pa.hex pb.hex --color never --unsafe"
      - assert:
          exit_code: 0
          stdout:
            contains: "4111111111111111"
