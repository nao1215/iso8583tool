# Migrated from iso8583tool's ShellSpec spec/custom_spec_spec.sh.
# Custom JSON spec import: moov-io/iso8583 field types the upstream importer does
# not wire up by default (Hex, Track1, Track3, IndexTag) and tag blocks that omit
# "sort" must load with --spec PATH instead of failing with a "no constructor" /
# "unknown sort function" error. Most specs define only the field under test, so
# the bundled example does not unpack and the command exits non-zero — that is
# expected; the assertion is that the failure is NOT the import error, proving
# the spec itself loaded. Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool custom JSON spec import

scenarios:
  - name: loads a top-level Hex field and round-trips it
    steps:
      - fixture:
          file: hex-top.json
          content: '{"name":"Hex top","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"52":{"type":"Hex","length":8,"description":"PIN Data","enc":"Binary","prefix":"Binary.Fixed"}}}'
      - fixture:
          file: doc.json
          content: '{"mti":"0100","binary_fields":{"52":"A1B2C3D4E5F60708"}}'
      - run:
          command: iso8583tool convert doc.json --to hex --spec hex-top.json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "no constructor"

  - name: loads a Hex TLV subfield
    steps:
      - fixture:
          file: hex-sub.json
          content: '{"name":"TLV Hex","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"55":{"type":"Composite","length":999,"description":"ICC","prefix":"ASCII.LLL","tag":{"enc":"BerTLVTag","sort":"StringsByHex","skipUnknownTLVTags":true,"storeUnknownTLVTags":true},"subfields":{"9F02":{"type":"Hex","length":6,"description":"Amount","enc":"Binary","prefix":"BerTLV"}}}}}'
      - run:
          command: "iso8583tool view ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec hex-sub.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            not_contains: "no constructor"

  - name: loads a Track1 field
    steps:
      - fixture:
          file: track1.json
          content: '{"name":"Track1","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"45":{"type":"Track1","length":76,"description":"Track 1","enc":"ASCII","prefix":"ASCII.LL"}}}'
      - run:
          command: "iso8583tool view ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec track1.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            not_contains: "no constructor"

  - name: loads a Track3 field
    steps:
      - fixture:
          file: track3.json
          content: '{"name":"Track3","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"36":{"type":"Track3","length":104,"description":"Track 3","enc":"ASCII","prefix":"ASCII.LLL"}}}'
      - run:
          command: "iso8583tool view ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec track3.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            not_contains: "no constructor"

  - name: loads an IndexTag composite subfield
    steps:
      - fixture:
          file: indextag.json
          content: '{"name":"IndexTag","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"48":{"type":"Composite","length":999,"description":"IndexTag Composite","prefix":"ASCII.LLL","tag":{"sort":"StringsByInt","length":2,"enc":"ASCII"},"subfields":{"1":{"type":"IndexTag","length":2,"description":"Tag index","enc":"ASCII","prefix":"ASCII.Fixed"}}}}}'
      - run:
          command: "iso8583tool view ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec indextag.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            not_contains: "no constructor"

  - name: loads a composite tag that omits sort
    steps:
      - fixture:
          file: nosort.json
          content: '{"name":"No sort","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"55":{"type":"Composite","length":999,"description":"ICC","prefix":"ASCII.LLL","tag":{"enc":"BerTLVTag","skipUnknownTLVTags":true,"storeUnknownTLVTags":true},"subfields":{"9F02":{"type":"Binary","length":6,"description":"Amount","enc":"Binary","prefix":"BerTLV"}}}}}'
      - run:
          command: "iso8583tool view ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec nosort.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            not_contains: "unknown sort function"
