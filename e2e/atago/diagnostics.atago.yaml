# Migrated from iso8583tool's ShellSpec spec/diagnostics_spec.sh.
# Detection messaging: doctor must not present the default preset as the single
# answer when more than one fits equally well, and both doctor and validate must
# call out a truncated/malformed capture instead of steering the user to a custom
# spec or to doctor when neither will help. Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool detection messaging

scenarios:
  - name: presents tied presets for an ambiguous message
    steps:
      - run:
          command: "iso8583tool doctor ${env:ISO_EXAMPLES}/spec87ascii/0800-network-echo.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "spec87ascii"
              - "fits equally well"

  - name: flags a truncated capture instead of only "custom layout"
    steps:
      - run:
          command: "iso8583tool doctor --raw 010000000000000008000103DF --no-color"
      - assert:
          exit_code: { not: 0 }
          stdout:
            contains: "truncated or malformed"

  - name: validate calls out a truncated capture rather than doctor
    steps:
      - run:
          command: "iso8583tool validate --raw 010000000000000008000103DF --no-color"
      - assert:
          exit_code: { not: 0 }
          stdout:
            contains: "truncated or malformed"
      - assert:
          stdout:
            not_contains: "iso8583tool doctor"
