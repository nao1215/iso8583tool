# Migrated from iso8583tool's ShellSpec spec/redact_spec.sh.
# redact: deterministic masking of cardholder data and secrets for safe sharing,
# JSON (default) and text output, and stdin. Input samples are referenced from
# $ISO_EXAMPLES/basei, or materialized as shell-free workdir fixtures. JSON
# fields are asserted via atago's `stdout.json` JSONPath matcher instead of jq.
# The ShellSpec write_kanmu_like_message helper (a raw binary capture built with
# printf octal escapes) is a base64 `fixture` here, so every scenario runs on
# every OS. PACKED_BCD_SPEC is the built-in spec id "spec87bcd-starter".
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool redact

scenarios:
  - name: masks the PAN in JSON output
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: never leaks the full PAN
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: fully masks the EMV application cryptogram
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.binary_fields['55.9F26']", equals: "****************" }

  - name: supports a human-readable text format
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Redacted:"
              - "411111******1111"

  - name: orders text output by MTI then numeric field id
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --color never"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            contains: "MTI:"
      - assert:
          stdout:
            line: 2
            contains: "F2 ="

  - name: reads from stdin for a Slack-safe pipe
    steps:
      - fixture:
          file: msg.hex
          content: ""
      - run:
          command: "iso8583tool redact -"
          stdin:
            file: msg.hex
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: masks a PAN embedded in a free-form private field (F63)
    steps:
      - fixture:
          file: p63.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111111111111111"}}'
      - run:
          command: "iso8583tool convert p63.json --to hex --output p63.hex"
      - run:
          command: "iso8583tool redact p63.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: auto-detected input encoding redacts a raw binary capture without --encoding
    steps:
      - fixture:
          file: message.bin
          base64: "AQBwBAAAAAAAABBAGSSZmZmZmTJzJwAAAAAROCIE"
      - run:
          command: "iso8583tool redact message.bin --spec spec87bcd-starter"
      - assert:
          exit_code: 0
          stdout:
            contains: '"mti"'

  - name: auto-detected input encoding still masks the PAN in a raw binary capture
    steps:
      - fixture:
          file: message.bin
          base64: "AQBwBAAAAAAAABBAGSSZmZmZmTJzJwAAAAAROCIE"
      - run:
          command: "iso8583tool redact message.bin --spec spec87bcd-starter"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", matches: "\\*" }
