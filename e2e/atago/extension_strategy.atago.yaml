# Migrated from iso8583tool's ShellSpec spec/extension_strategy_spec.sh.
# The Extension Field Strategy section must describe how the active spec actually
# models a field. A bare custom --spec PATH is not BASE I, so it gets no built-in
# catalog at all; a built-in field modeled as a plain string is reported opaque,
# not by the catalog's positional/bitmap assumption; and setting a dot-path on a
# plain built-in field fails with a clear explanation.
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool extension strategy

scenarios:
  - name: a custom positional composite spec does not apply the BASE I catalog
    steps:
      - fixture:
          file: spec.json
          content: |
            {
              "name": "F48 positional",
              "fields": {
                "0": {"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},
                "1": {"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},
                "11": {"type":"String","length":6,"description":"STAN","enc":"ASCII","prefix":"ASCII.Fixed"},
                "48": {
                  "type":"Composite","length":999,"description":"Private Data","prefix":"ASCII.LLL",
                  "tag":{"sort":"StringsByInt"},
                  "subfields": {
                    "1": {"type":"String","length":3,"description":"A","enc":"ASCII","prefix":"ASCII.Fixed"},
                    "2": {"type":"String","length":2,"description":"B","enc":"ASCII","prefix":"ASCII.Fixed"}
                  }
                }
              }
            }
      - fixture:
          file: msg.json
          content: '{"mti":"0100","fields":{"11":"123456","48.1":"ABC","48.2":"DE"}}'
      - run:
          command: "iso8583tool convert msg.json --to hex --spec spec.json --output msg.hex"
      - run:
          command: "iso8583tool view msg.hex --spec spec.json --encoding hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            not_contains:
              - "Extension Field Strategy:"
              - "Additional Data - Private"
              - "[tlv]"

  - name: a built-in plain field documented as bitmap reports field 127 as opaque, matching the spec
    steps:
      - fixture:
          file: msg.json
          content: '{"mti":"0100","fields":{"11":"123456","127":"EEE"}}'
      - run:
          command: "iso8583tool convert msg.json --to hex --output msg.hex"
      - run:
          command: "iso8583tool view msg.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "F127 Reserved Private [opaque]"
      - assert:
          stdout:
            not_contains: "F127 Reserved Private [bitmap]"

  - name: explains a dot-path set on a plain built-in field
    steps:
      - fixture:
          file: dotpath.json
          content: '{"mti":"0100","fields":{"11":"123456","48.1":"AB"}}'
      - run:
          command: "iso8583tool convert dotpath.json --to hex"
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "dot-path subfields"
      - assert:
          stderr:
            not_contains: "PathMarshaler"
