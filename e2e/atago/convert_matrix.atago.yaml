          command: iso8583tool specs --format json
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$[2].name"
              equals: "spec87bcd-starter"

  - name: specs rejects an unexpected positional argument
    steps:
      - run:
          command: iso8583tool specs extra
