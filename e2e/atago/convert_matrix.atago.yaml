              - "(default)"

  - name: specs --format json exposes the default preset first
    steps:
      - run:
          command: iso8583tool specs --format json
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$[0].name"
              equals: "basei-starter"

  - name: specs --format json marks the first preset as default
    steps:
      - run:
          command: iso8583tool specs --format json
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$[0].default"
              equals: true

