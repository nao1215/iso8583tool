# Migrated from iso8583tool's ShellSpec spec/doctor_spec.sh.
# doctor: detect which built-in preset fits a message, across ASCII and packed
# BCD, and the no-fit / validate-hint paths. The write_kanmu_like_message helper
# (a packed-BCD raw message) is inlined as a printf into a .bin file; the
# shell-safe and custom-spec hint setups are inlined too.
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool doctor

scenarios:
  - name: recommends the BASE I starter for an ASCII BASE I message
    steps:
      - run:
          command: "iso8583tool doctor ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Recommended: --spec basei-starter"
              - "Confirm with: iso8583tool view"

  - name: detects a packed-BCD raw message
    steps:
      - fixture: &packed_bcd_bin
          file: message.bin
          base64: AQBwBAAAAAAAABBAGSSZmZmZmTJzJwAAAAAROCIE
      - run:
          command: "iso8583tool doctor message.bin --encoding raw"
      - assert:
          exit_code: 0
          stdout:
            contains: "Recommended: --spec spec87bcd-starter"

  - name: auto-detects a raw .bin without --encoding
    steps:
      - fixture: *packed_bcd_bin
      - run:
          command: "iso8583tool doctor message.bin"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "(raw input)"
              - "Recommended: --spec spec87bcd-starter"

  - name: emits a JSON report with --format json
    steps:
      - run:
          command: "iso8583tool doctor ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - '"recommended": "basei-starter"'
              - '"exact_round_trip": true'

  - name: exits non-zero when no preset fits
    steps:
      - run:
          command: "iso8583tool doctor --raw fffefd"
      - assert:
          exit_code: { not: 0 }
          stdout:
            contains: "No built-in preset could unpack"

  - name: is suggested by a wrong-spec validate failure
    # A complete message that fails at a data field under the wrong spec is the
    # case the doctor hint is for; a header-level failure is reported as
    # truncated/corrupt instead.
    steps:
      - run:
          command: "iso8583tool validate ${env:ISO_EXAMPLES}/spec87ascii/0800-network-echo.hex --spec spec87bcd-starter"
      - assert:
          exit_code: { not: 0 }
          stdout:
            contains: "doctor"

  - name: marks every tied preset recommended and confirms with each
    steps:
      - run:
          command: "iso8583tool doctor ${env:ISO_EXAMPLES}/spec87ascii/0800-network-echo.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "view --spec basei-starter"
              - "view --spec spec87ascii"

  - name: explains how to choose between the tied basei-starter and spec87ascii presets
    steps:
      - run:
          command: "iso8583tool doctor ${env:ISO_EXAMPLES}/spec87ascii/0800-network-echo.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Field 55"
              - "EMV"

  - name: shell-safe confirm hint quotes a path that contains a space
    steps:
      - run:
          command: 'cp "${env:ISO_EXAMPLES}/basei/0110-auth-response.hex" "with space.hex"'
      - run:
          command: 'iso8583tool doctor "with space.hex" --no-color'
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "'"
              - "with space.hex"

  - name: custom-spec validate hint does not steer a custom-spec failure to doctor
    steps:
      - fixture:
          file: spec.json
          content: '{"name":"F48 positional","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"11":{"type":"String","length":6,"description":"STAN","enc":"ASCII","prefix":"ASCII.Fixed"},"48":{"type":"Composite","length":999,"description":"Private Data","prefix":"ASCII.LLL","tag":{"sort":"StringsByInt"},"subfields":{"1":{"type":"String","length":3,"description":"A","enc":"ASCII","prefix":"ASCII.Fixed"},"2":{"type":"String","length":2,"description":"B","enc":"ASCII","prefix":"ASCII.Fixed"}}}}}'
      - fixture:
          file: other.json
          content: '{"name":"F127 bitmap","fields":{"0":{"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},"1":{"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},"11":{"type":"String","length":6,"description":"STAN","enc":"ASCII","prefix":"ASCII.Fixed"},"127":{"type":"Composite","length":255,"description":"Private use field","prefix":"ASCII.LL","bitmap":{"type":"Bitmap","length":8,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed","disableAutoExpand":true},"subfields":{"1":{"type":"String","length":2,"description":"A","enc":"ASCII","prefix":"ASCII.Fixed"},"2":{"type":"String","length":2,"description":"B","enc":"ASCII","prefix":"ASCII.Fixed"}}}}}'
      - fixture:
          file: msg-src.json
          content: '{"mti":"0100","fields":{"11":"123456","127.1":"AA","127.2":"BB"}}'
      - run:
          command: "iso8583tool convert msg-src.json --to hex --spec other.json --output msg.hex"
      - run:
          command: "iso8583tool validate msg.hex --spec spec.json --encoding hex --no-color"
      - assert:
          exit_code: { not: 0 }
          stdout:
            not_contains: "doctor"
      - assert:
          stdout:
            contains: "spec file"
