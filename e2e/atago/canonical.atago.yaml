# Migrated from iso8583tool's ShellSpec spec/canonical_spec.sh.
# Canonical field values: the full describe view, the filtered view and the
# decoded[] entries must all show a zero-padded fixed-length field at its
# canonical width (F3 "000000", F4 "000000005000"), not the collapsed integer
# form. MSG is the bundled $EXAMPLES/0110-auth-response.hex, referenced via the
# host env $ISO_EXAMPLES. Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool canonical field values

scenarios:
  - name: shows F3 with canonical width in the full describe view
    steps:
      - run:
          shell: true
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            empty: false
      - assert:
          stdout:
            contains: "Processing Code"
      # The F3 line carries the canonical, zero-padded processing code.
      - assert:
          stdout:
            matches: "F3.*: 000000"

  - name: matches the filtered view for F4
    steps:
      - run:
          shell: true
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --filter 4 --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "000000005000"

  - name: returns canonical decoded values in JSON for F3
    steps:
      - run:
          shell: true
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --format json"
      - assert:
          exit_code: 0
      # Both the fields map and the decoded entry use the canonical width.
      - assert:
          stdout:
            contains:
              - '"3": "000000"'
              - '"value": "000000"'

  - name: returns canonical decoded values from validate for F3
    steps:
      - run:
          shell: true
          command: "iso8583tool validate $ISO_EXAMPLES/basei/0110-auth-response.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            contains: '"value": "000000"'
