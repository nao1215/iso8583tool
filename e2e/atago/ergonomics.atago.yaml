# Migrated from iso8583tool's ShellSpec spec/ergonomics_spec.sh.
# Everyday ergonomics: flags before or after the positional target, repeated
# --filter, color modes (auto/always/never/--no-color), end-of-options, and
# config selection. The ShellSpec ANSI checks compare against a literal ESC
# byte ($(printf '\033')); here the command is piped through `cat -v` so ESC
# renders as the literal text "^[", which atago matches as a substring.
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool ergonomics

# Every command here needs the shell (env vars like $ISO_EXAMPLES, pipes into
# `cat -v`, redirects), so default shell:true once instead of on every run step
# (ADR-0039). A step can still add its own runner/cwd/timeout/env/stdin.
defaults:
  run:
    shell: true

scenarios:
  - name: flag ordering - accepts the target after the flags
    steps:
      - run:
          command: "iso8583tool view --format json $ISO_EXAMPLES/basei/0110-auth-response.hex"
      - assert:
          exit_code: 0
          stdout:
            contains: '"mti"'

  - name: flag ordering - accepts the target before the flags
    steps:
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            contains: '"mti"'

  - name: flag ordering - accepts flags interleaved around the target
    steps:
      - run:
          command: "iso8583tool view --filter 39 $ISO_EXAMPLES/basei/0110-auth-response.hex --filter 49"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Approved"
              - "JPY"

  - name: color - is plain by default when not on a terminal
    # When captured (not a tty) auto stays off, so a plain run has no escapes.
    steps:
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex | cat -v"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "^["

  - name: color - forces color with --color always
    steps:
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --color always | cat -v"
      - assert:
          exit_code: 0
          stdout:
            contains: "^["

  - name: color - stays plain with --no-color even when forced elsewhere
    steps:
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --no-color | cat -v"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "^["

  - name: color - rejects an unknown --color value instead of ignoring it
    steps:
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --color banana"
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "invalid --color"

  - name: end of options - treats a dash-leading filename after -- as a positional
    steps:
      - run:
          command: 'cp "$ISO_EXAMPLES/basei/0110-auth-response.hex" ./-response.hex'
      - run:
          command: "iso8583tool view -- -response.hex"
      - assert:
          exit_code: 0
          stdout:
            contains: "MTI"

  - name: config - applies an extension catalog from --config
    steps:
      - fixture:
          file: cfg.json
          content: '{"spec":"basei-starter","extensions":[{"id":63,"name":"Acme Blob","strategy":"opaque"}]}'
      - run:
          command: "iso8583tool validate $ISO_EXAMPLES/basei/0110-auth-response.hex --config cfg.json"
      - assert:
          exit_code: 0
          stdout:
            contains: "Acme Blob"

  - name: config - fails on a config with an invalid strategy
    steps:
      - fixture:
          file: bad.json
          content: '{"extensions":[{"id":1,"strategy":"nope"}]}'
      - run:
          command: "iso8583tool view $ISO_EXAMPLES/basei/0110-auth-response.hex --config bad.json"
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "strategy"
