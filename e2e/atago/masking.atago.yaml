# Migrated from iso8583tool's ShellSpec spec/masking_spec.sh.
# Sensitive-data masking: view/redact/diff mask a PAN/track wherever it appears
# without over-masking a plain business identifier or a non-PAN field such as
# the country code (field 20). The ShellSpec view_json helper
# (printf doc | convert --to hex | view - --format json) is inlined into each
# shell: true pipeline. Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool sensitive-data masking

scenarios:
  - name: does not mask a non-PAN business identifier
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"ORDER_ID=1234567890123|TOKEN=ABC"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            contains: "ORDER_ID=1234567890123"

  - name: masks a dash-separated PAN
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111-1111-1111-1111"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "1111-1111-1111"

  - name: masks a space-separated PAN
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111 1111 1111 1111"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "1111 1111 1111"

  - name: masks a PAN embedded in a non-private free-form field
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","44":"PAN=4111111111111111"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: masks the extended PAN field 34
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0100","fields":{"11":"123456","34":"411111111111111111111111"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "411111111111111111111111"

  - name: does not mask the country code field 20
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0100","fields":{"11":"123456","20":"840"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            contains: '"20": "840"'

  - name: shows the raw field 20 change in diff
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0100","fields":{"11":"123456","20":"840"}}' | iso8583tool convert --to hex > a.hex
            printf '%s' '{"mti":"0100","fields":{"11":"123456","20":"392"}}' | iso8583tool convert --to hex > b.hex
      - run:
          command: "iso8583tool diff a.hex b.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "840"
              - "392"

  - name: masks a whole free-form track, not just its PAN
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"TRACK2=4111111111111111D29122011234567890"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "29122011234567890"

  - name: masks an underscore-labeled PAN (card_no)
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"card_no=4222222222222222"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4222222222222222"

  - name: masks a spaced-label PAN (card number)
    skip: { os: windows }
    steps:
      - run:
          shell: true
          command: |
            printf '%s' '{"mti":"0110","fields":{"11":"123456","39":"00","63":"card number=4222222222222222"}}' | iso8583tool convert --to hex | iso8583tool view - --format json
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4222222222222222"

  - name: a custom positional composite with a PAN-numbered subfield does not mask subfield 48.2 with the top-level PAN rule
    steps:
      - fixture:
          file: spec.json
          content: |
            {
              "name": "F48 positional",
              "fields": {
                "0": {"type":"String","length":4,"description":"MTI","enc":"ASCII","prefix":"ASCII.Fixed"},
                "1": {"type":"Bitmap","length":16,"description":"Bitmap","enc":"HexToASCII","prefix":"Hex.Fixed"},
                "11": {"type":"String","length":6,"description":"STAN","enc":"ASCII","prefix":"ASCII.Fixed"},
                "48": {
                  "type":"Composite","length":999,"description":"Private Data","prefix":"ASCII.LLL",
                  "tag":{"sort":"StringsByInt"},
                  "subfields": {
                    "1": {"type":"String","length":3,"description":"A","enc":"ASCII","prefix":"ASCII.Fixed"},
                    "2": {"type":"String","length":2,"description":"B","enc":"ASCII","prefix":"ASCII.Fixed"}
                  }
                }
              }
            }
      - fixture:
          file: msg.json
          content: '{"mti":"0100","fields":{"11":"123456","48.1":"ABC","48.2":"DE"}}'
      - run:
          command: "iso8583tool convert msg.json --to hex --spec spec.json --output msg.hex"
      - run:
          command: "iso8583tool view msg.hex --spec spec.json --encoding hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "48.2"
              - "DE"
