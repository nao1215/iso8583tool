# Deep behavioral matrix for the `redact` and `diff` surfaces of iso8583tool.
#
# These scenarios are intentionally NON-smoke: every one asserts a real contract
# — a masking rule, an exit-code branch, a diff kind (changed/added/removed/MTI),
# a filter semantics, a friendly unpack error, or a metamorphic/differential
# property. They deliberately AVOID duplicating redact.atago.yaml,
# masking.atago.yaml, masking_custom.atago.yaml, diff.atago.yaml and
# sanitize_output.atago.yaml, and add fresh angles instead:
#   * shell-free diff pair crafting via fixture JSON + `convert --to hex --output`
#     (the existing diff spec builds pairs with a POSIX sed pipeline);
#   * JSONPath assertions on redact/diff JSON output (no jq shell dependency);
#   * every diff kind isolated, plus differential A/B vs B/A mirror checks;
#   * round-trip idempotence: a redacted document re-packed and re-viewed stays
#     non-sensitive;
#   * unpack-failure friendliness ("cannot unpack field", never "failed to
#     decode content") on both surfaces.
#
# Cross-platform: the diff pairs are built with `convert --output` and diffed as
# positional file args, and one-side stdin uses `stdin: { inline: ... }`, so
# almost nothing needs a POSIX shell. The few scenarios that genuinely need a
# shell pipe are marked `skip: { os: windows }` and kept to a minimum.
#
# ISO_EXAMPLES points at examples/ (see e2e/run.sh). The 0100 sample PAN is
# 4111111111111111 (masked form 411111******1111); its EMV cryptogram is
# 55.9F26 and its track is F35 (4111111111111111D29122011234567890).
#
# The inline SMALL hex below is `{"mti":"0100","fields":{"2":"4111111111111111",
# "11":"123456"}}` packed under basei-starter, used for --raw / inline-stdin
# input paths without touching the filesystem.
#
# Run with: make e2e   (or e2e/run.sh)
version: "1"

suite:
  name: iso8583tool redact & diff matrix

scenarios:
  # ----------------------------------------------------------------------------
  # redact — JSON output (default) masking rules, via JSONPath (no jq)
  # ----------------------------------------------------------------------------
  - name: redact json masks the PAN field 2 to BIN and last four
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact json fully masks the EMV application cryptogram 9F26
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.binary_fields['55.9F26']", equals: "****************" }

  - name: redact json masks the whole track in field 35 keeping only the BIN
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['35']", equals: "411111****************************" }

  - name: redact json preserves the MTI unchanged
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.mti", equals: "0100" }

  - name: redact json leaves a non-sensitive STAN field 11 untouched
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['11']", equals: "123456" }

  - name: redact json output never leaks the raw PAN substring (property)
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact json output never leaks the track discretionary tail (property)
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "29122011234567890"

  # ----------------------------------------------------------------------------
  # redact — text output
  # ----------------------------------------------------------------------------
  - name: redact text shows the Redacted footer and the masked PAN
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Redacted:"
              - "411111******1111"

  - name: redact text lists the redacted paths in the footer
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "Redacted: 2, 35, 55.9F26"

  - name: redact text renders the masked PAN on its own field line
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "F2 = 411111******1111"

  - name: redact text never leaks the raw PAN
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact text starts with the MTI header line
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            contains: "MTI: 0100"

  - name: redact text on a message with no sensitive data omits the Redacted footer
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0800-network-echo.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "Redacted:"
      - assert:
          stdout:
            line: 1
            contains: "MTI: 0800"

  # ----------------------------------------------------------------------------
  # redact — colorization contract
  # ----------------------------------------------------------------------------
  - name: redact text with color always emits an ANSI escape byte
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --color always"
      - assert:
          exit_code: 0
          stdout:
            contains: "\x1b"

  - name: redact text with color never emits no ANSI escape byte
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format text --color never"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "\x1b"

  # ----------------------------------------------------------------------------
  # redact — unsupported format & spec presets
  # ----------------------------------------------------------------------------
  - name: redact rejects an unsupported output format
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format xml"
      - assert:
          exit_code: 1
          stderr:
            contains: "unsupported format"

  - name: redact format is case-sensitive so JSON in caps is rejected
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format JSON"
      - assert:
          exit_code: 1
          stderr:
            contains: "unsupported format"

  - name: redact honors the explicit default basei-starter preset
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec basei-starter"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact reads a spec87ascii message under the spec87ascii preset
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/spec87ascii/0800-network-echo.hex --spec spec87ascii --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.mti", equals: "0800" }

  - name: redact rejects an unknown spec preset with a discoverable hint
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec basei-startr"
      - assert:
          exit_code: 1
          stderr:
            contains:
              - "unknown spec"
              - "iso8583tool specs"

  - name: redact reports a missing JSON spec file distinctly from an unknown preset
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --spec /nope/spec.json"
      - assert:
          exit_code: 1
          stderr:
            contains: "spec file not found"

  # ----------------------------------------------------------------------------
  # redact — masking across the request/response sample matrix
  # ----------------------------------------------------------------------------
  - name: redact masks the PAN in the 0110 authorization response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact never leaks the PAN in the 0110 response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact masks the PAN in the 0200 financial request
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact masks the cryptogram in the 0200 financial request
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.binary_fields['55.9F26']", equals: "****************" }

  - name: redact never leaks the PAN in the 0200 request
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact never leaks the track tail in the 0200 request
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "29122011234567890"

  - name: redact masks the PAN in the 0210 financial response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0210-financial-response.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact never leaks the PAN in the 0210 response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0210-financial-response.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact masks the PAN in the 0420 reversal advice
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0420-reversal-advice.hex --format text --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "F2 = 411111******1111"

  - name: redact never leaks the track tail in the 0420 reversal advice
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0420-reversal-advice.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "29122011234567890"

  - name: redact masks the PAN in the 0430 reversal response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0430-reversal-response.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact never leaks the PAN in the 0430 response
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0430-reversal-response.hex"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact passes a PAN-free network echo through with the MTI intact
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0810-network-echo-response.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.mti", equals: "0810" }

  # ----------------------------------------------------------------------------
  # redact — input channels: positional file, inline --raw, inline stdin
  # ----------------------------------------------------------------------------
  - name: redact accepts a positional file argument
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.mti", equals: "0100" }

  - name: redact accepts an inline --raw hex message
    steps:
      - run:
          command: "iso8583tool redact --raw 303130303430323030303030303030303030303030303030303030303030303030303030313634313131313131313131313131313131313233343536 --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact --raw never leaks the raw PAN
    steps:
      - run:
          command: "iso8583tool redact --raw 303130303430323030303030303030303030303030303030303030303030303030303030313634313131313131313131313131313131313233343536 --format json"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  - name: redact reads a message from stdin given as dash
    steps:
      - run:
          command: "iso8583tool redact - --format json"
          stdin:
            base64: "MzAzMTMwMzAzNDMwMzIzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzEzNjM0MzEzMTMxMzEzMTMxMzEzMTMxMzEzMTMxMzEzMTMxMzEzMjMzMzQzNTM2"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact reads a message from stdin when the argument is omitted
    steps:
      - run:
          command: "iso8583tool redact --format text --no-color"
          stdin:
            base64: "MzAzMTMwMzAzNDMwMzIzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzAzMDMwMzEzNjM0MzEzMTMxMzEzMTMxMzEzMTMxMzEzMTMxMzEzMTMxMzEzMjMzMzQzNTM2"
      - assert:
          exit_code: 0
          stdout:
            contains: "F2 = 411111******1111"

  - name: redact reads a fixture file via sandboxed stdin
    steps:
      - fixture:
          file: msg.hex
          content: "303130303430323030303030303030303030303030303030303030303030303030303030313634313131313131313131313131313131313233343536"
      - run:
          command: "iso8583tool redact - --format json"
          stdin:
            file: msg.hex
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact honors an explicit hex encoding on a hex file
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --encoding hex --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.fields['2']", equals: "411111******1111" }

  - name: redact rejects a second positional argument with usage
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex extra.hex"
      - assert:
          exit_code: 1
          stderr:
            contains: "Usage: iso8583tool redact"

  # ----------------------------------------------------------------------------
  # redact — unpack-failure friendliness (post-fix diagnostic)
  # ----------------------------------------------------------------------------
  - name: redact gives a friendly cannot-unpack error on garbage bytes
    steps:
      - run:
          command: "iso8583tool redact --raw FFFFFFFFFFFFFFFF"
      - assert:
          exit_code: 1
          stderr:
            contains: "cannot unpack field"

  - name: redact never surfaces the raw decode-content error on garbage bytes
    steps:
      - run:
          command: "iso8583tool redact --raw FFFFFFFFFFFFFFFF"
      - assert:
          exit_code: 1
          stderr:
            not_contains: "failed to decode content"

  # ----------------------------------------------------------------------------
  # redact — embedded PAN in a private free-form field (shell-free craft)
  # ----------------------------------------------------------------------------
  - name: redact masks a PAN embedded in the private field 63
    steps:
      - fixture:
          file: p63.json
          content: '{"mti":"0110","fields":{"11":"123456","39":"00","63":"PAN=4111111111111111"}}'
      - run:
          command: "iso8583tool convert p63.json --to hex --output p63.hex"
      - run:
          command: "iso8583tool redact p63.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            not_contains: "4111111111111111"

  # ----------------------------------------------------------------------------
  # redact — round-trip idempotence / safety
  # A redacted 0210 document (no binary cardholder tags) is re-packed and
  # re-viewed; the pipeline output must stay non-sensitive.
  # ----------------------------------------------------------------------------
  - name: a redacted document re-packed to hex holds no raw PAN
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0210-financial-response.hex --format json"
          stdout_to: red.json
      - run:
          command: "iso8583tool convert red.json --to hex --output red.hex"
      - assert:
          exit_code: 0
      - assert:
          file:
            path: red.hex
            exists: true
      - assert:
          file:
            path: red.hex
            not_contains: "4111111111111111"

  - name: viewing a re-packed redacted document keeps the PAN masked
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0210-financial-response.hex --format json"
          stdout_to: red.json
      - run:
          command: "iso8583tool convert red.json --to hex --output red.hex"
      - run:
          command: "iso8583tool view red.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "411111******1111"
      - assert:
          stdout:
            not_contains: "4111111111111111"

  - name: redacting is deterministic so a captured output is stable
    steps:
      - run:
          command: "iso8583tool redact ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --format json"
          stdout_to: r1.json
      - assert:
          exit_code: 0
      - assert:
          file:
            path: r1.json
            contains: "411111******1111"
      - assert:
          file:
            path: r1.json
            not_contains: "4111111111111111"

  # ============================================================================
  # diff — no differences
  # ============================================================================
  - name: diff of a message against itself reports no differences
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex ${env:ISO_EXAMPLES}/basei/0100-auth-request.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "No differences."

  - name: diff of the 0200 request against itself reports no differences
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex ${env:ISO_EXAMPLES}/basei/0200-financial-request.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "No differences."

  - name: diff of identical crafted messages reports no differences
    steps:
      - fixture:
          file: id.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - run:
          command: "iso8583tool convert id.json --to hex --output id.hex"
      - run:
          command: "iso8583tool diff id.hex id.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains: "No differences."

  - name: diff json of identical messages has an empty changes set
    steps:
      - run:
          command: "iso8583tool diff ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex ${env:ISO_EXAMPLES}/basei/0110-auth-response.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            contains: '"changes"'

  # ============================================================================
  # diff — the four change kinds, isolated on crafted pairs (shell-free)
  # ============================================================================
  - name: diff reports a changed field with both old and new values
    steps:
      - fixture:
          file: ca.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: cb.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert ca.json --to hex --output ca.hex"
      - run:
          command: "iso8583tool convert cb.json --to hex --output cb.hex"
      - run:
          command: "iso8583tool diff ca.hex cb.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Field 4 changed"
              - "- 000000005000"
              - "+ 000000009999"

  - name: diff json labels a changed field with kind changed
    steps:
      - fixture:
          file: ca.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: cb.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert ca.json --to hex --output ca.hex"
      - run:
          command: "iso8583tool convert cb.json --to hex --output cb.hex"
      - run:
          command: "iso8583tool diff ca.hex cb.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.changes[0].kind", equals: "changed" }

  - name: diff json records the changed field path
    steps:
      - fixture:
          file: ca.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: cb.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert ca.json --to hex --output ca.hex"
      - run:
          command: "iso8583tool convert cb.json --to hex --output cb.hex"
      - run:
          command: "iso8583tool diff ca.hex cb.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.changes[0].path", equals: "4" }

  - name: diff json carries the changed before value
    steps:
      - fixture:
          file: ca.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: cb.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
          command: "iso8583tool convert ca.json --to hex --output ca.hex"
      - run:
          command: "iso8583tool convert cb.json --to hex --output cb.hex"
      - run:
          command: "iso8583tool diff ca.hex cb.hex --format json"
      - assert:
          exit_code: 0
          stdout:
            json: { path: "$.changes[0].after", equals: "000000009999" }

  - name: diff reports an added field present only on the after side
    steps:
      - fixture:
          file: aa.json
          content: '{"mti":"0100","fields":{"11":"123456"}}'
      - fixture:
          file: ab.json
          content: '{"mti":"0100","fields":{"11":"123456","42":"MERCHANT0000001"}}'
      - run:
          command: "iso8583tool convert aa.json --to hex --output aa.hex"
      - run:
          command: "iso8583tool convert ab.json --to hex --output ab.hex"
      - run:
          command: "iso8583tool diff aa.hex ab.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Field 42 added"
              - "+ MERCHANT0000001"

  - name: diff json labels an added field with kind added
    steps:
      - fixture:
          file: aa.json
          content: '{"mti":"0100","fields":{"11":"123456"}}'
      - fixture:
          file: ab.json
