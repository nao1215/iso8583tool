      - run:
          command: "iso8583tool diff da.hex db.hex --no-color"
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "- 000000005000"
              - "+ 000000009999"

  - name: diff B A reverses the changed direction of the same pair
    steps:
      - fixture:
          file: da.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000005000"}}'
      - fixture:
          file: db.json
          content: '{"mti":"0100","fields":{"11":"123456","4":"000000009999"}}'
      - run:
